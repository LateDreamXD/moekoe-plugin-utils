name: test

on:
  push:
    branches: [main]
    paths-ignore: ['README.md', 'schema/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 22
      - name: install deps
        run: pnpm install --frozen-lockfile
      - name: build
        run: pnpm run build
      - name: test
        run: pnpm run test